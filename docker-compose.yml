# One-shot demo commands. Run with:
#   docker-compose run --rm main-demo
#   docker-compose run --rm remote-demo
#   docker-compose run --rm pandas-bench

services:
  main-demo:
    image: duckdb/duckdb
    container_name: duckdb-main-demo
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint:
      - /duckdb
      - outputs/nyc_taxi_demo.duckdb
      - -cmd
      - .read scripts/run_demo.sql
      - -no-stdin

  remote-demo:
    image: duckdb/duckdb
    container_name: duckdb-remote-demo
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint:
      - /duckdb
      - -cmd
      - .read scripts/remote_query.sql
      - -no-stdin

  pandas-bench:
    build: .
    image: duckdb-pandas-demo
    container_name: duckdb-pandas-bench
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - python
      - scripts/pandas_interop.py
